name: Publish Instagram + Facebook

on:
  schedule:
    - cron: '0 6 * * 2'  # Mardi 8h Brussels (UTC+2 été / UTC+1 hiver)
    - cron: '0 10 * * 4' # Jeudi 12h Brussels
    - cron: '0 7 * * 6'  # Samedi 9h Brussels
  workflow_dispatch:      # déclenchement manuel possible

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Instagram + Facebook
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: node src/run.js --platform instagram,facebook

      - name: Save publication log
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add logs/posts.json
          git diff --cached --quiet || git commit -m "log: publication $(date +'%Y-%m-%d')"
          git push
