name: Publish Instagram + Facebook

on:
  schedule:
    - cron: '0 8 * * 1-6'  # Lun-Sam 10h Brussels (UTC+2 été) / 9h (UTC+1 hiver)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (génère sans publier)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Instagram + Facebook
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: node src/run.js --platform instagram ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Save publication log
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add logs/posts.json
          git diff --cached --quiet || git commit -m "log: publication $(date +'%Y-%m-%d')"
          git push
